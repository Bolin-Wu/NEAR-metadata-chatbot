services:
  near-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: near-chatbot
    restart: always
    env_file:
      - .env
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - chroma_data:/app/chroma_azure_db

volumes:
  chroma_data:
